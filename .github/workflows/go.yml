name: Go

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Build
        run: go build -v ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: false

      - name: Verify tag points to main
        run: |
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Build release binaries
        run: |
          set -eu

          version="${GITHUB_REF_NAME#v}"
          mkdir -p dist

          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags "-X pryl/internal/version.Value=${version}" \
            -o dist/pryl-darwin-arm64 ./cmd/pryl

          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags "-X pryl/internal/version.Value=${version}" \
            -o dist/pryl-darwin-amd64 ./cmd/pryl

          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 \
            go build -ldflags "-X pryl/internal/version.Value=${version}" \
            -o dist/pryl-linux-amd64 ./cmd/pryl

          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 \
            go build -ldflags "-X pryl/internal/version.Value=${version}" \
            -o dist/pryl-linux-arm64 ./cmd/pryl

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/*
